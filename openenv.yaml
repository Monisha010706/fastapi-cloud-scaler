name: cloud-scaling-env
version: 1.0

observation_space:
  cpu_utilization: float
  memory_utilization: float
  num_instances: int
  incoming_traffic: int
  time_step: int

action_space:
  0: do_nothing
  1: scale_up
  2: scale_down

reward_range: [-2, 1]

tasks:
  - name: easy
  - name: medium
  - name: hard
